opcache.enable=1
opcache.enable_cli=0
opcache.memory_consumption=256
opcache.interned_strings_buffer=16
opcache.max_accelerated_files=20000
; Bind-mounted `./api:/app` on deploy hosts: allow PHP to notice pulled changes without always recreating the container.
; For fully immutable images (no source mount), set validate_timestamps=0 and revalidate_freq=0 instead.
opcache.validate_timestamps=1
opcache.revalidate_freq=2
opcache.jit=1255
opcache.jit_buffer_size=64M
