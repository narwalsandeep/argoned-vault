# ${API_PORT}, ${UI_PORT}, , ${PGADMIN_PORT} — Compose interpolation for mapped/listening ports.
# Postgres is always published on host **5454** (→ container **5432**); see `db` below.
# Use: docker compose --env-file ./api/.env up   (CI/deploy too.) Optional: `vault/.env` beside this file for interpolation.
#
# pgAdmin (local dev only; not in docker-compose.prod.yml): open http://localhost:${PGADMIN_PORT}/ and sign in
# with PGADMIN_EMAIL / PGADMIN_PASSWORD. Add a server: host `db`, port 5432, database/user/password = DB_*
# from `api/.env` (use internal port 5432, not DB_PORT).
services:
  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    container_name: blackbox-ui
    working_dir: /app
    # Bind 0.0.0.0 so host browser can reach the dev server; port must match UI_PORT mapping.
    command: >
      sh -c "npm install && exec npx ng serve argoned-app
      --host 0.0.0.0
      --port $${UI_PORT}
      --poll 2000"
    volumes:
      - ./ui:/app
      - ui_node_modules:/app/node_modules
    # Host and container port must match: `ng serve` uses UI_PORT inside the container.
    ports:
      - "${UI_PORT:-3002}:${UI_PORT:-3002}"
    # Same file as API/db: UI container gets API_BASE_URL, UI_ORIGIN, ports, etc. (Compose injects; not the browser bundle).
    env_file:
      - ./api/.env
    environment:
      # Overrides env_file UI_PORT so listen port matches published port (see file header).
      UI_PORT: "${UI_PORT:-3002}"
      CHOKIDAR_USEPOLLING: "true"
    networks:
      - blackbox_net

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: blackbox-api
    working_dir: /app
    # Variables come from ./api/.env (see api/.env.example). No repo-root .env is required.
    env_file:
      - ./api/.env
    # Fresh `docker compose up --build`: install deps, run pending migrations, then start API.
    command: sh -c "composer install --no-interaction && composer migrate && exec php -S 0.0.0.0:$${API_PORT} -t public"
    volumes:
      - ./api:/app
      - api_vendor:/app/vendor
    ports:
      - "${API_PORT:-3003}:${API_PORT:-3003}"
    environment:
      # Override host DB_* from api/.env so the API reaches Postgres on the Docker network (bundled `db` service).
      DB_HOST: db
      # Postgres listens on 5432 inside the `db` container; host mapping is 5454→5432 — API must use 5432 here.
      DB_PORT: "5432"
      # Overrides env_file API_PORT so PHP listen port matches published port (see file header).
      API_PORT: "${API_PORT:-3003}"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      # curl: php file_get_contents(http://...) is unreliable in CLI; curl matches real clients.
      test:
        [
          "CMD-SHELL",
          "curl -fSs --connect-timeout 2 \"http://127.0.0.1:$${API_PORT}/health/live\" -o /dev/null || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 120s
    networks:
      - blackbox_net

  db:
    image: postgres:17-alpine
    container_name: blackbox-db
    restart: unless-stopped
    env_file:
      - ./api/.env
    # Official Postgres image only reads POSTGRES_*; map once from DB_* (see api/.env.example).
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        export POSTGRES_DB="$${DB_NAME:-blackbox}"
        export POSTGRES_USER="$${DB_USER:-blackbox}"
        export POSTGRES_PASSWORD="$${DB_PASSWORD:-blackbox}"
        exec /usr/local/bin/docker-entrypoint.sh postgres
    ports:
      # Fixed host port 5454 everywhere (local + EC2). Inside Docker, services use db:5432.
      - "5454:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${DB_USER}\" -d \"$${DB_NAME}\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - blackbox_net

  # Browser UI to manage Postgres; dev/local stack only.
  pgadmin:
    image: dpage/pgadmin4:9
    container_name: blackbox-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-team@switchcodes.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin@123}
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - blackbox_net

volumes:
  postgres_data:
  ui_node_modules:
  api_vendor:

networks:
  blackbox_net:
    driver: bridge
